<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SECRETLY</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
:root{
  --bg:#060606;--bg2:#0D0D0D;--bg3:#141414;
  --g1:#1a1a1a;--g2:#2a2a2a;--g3:#3a3a3a;
  --silver:#E0E0E0;--silver2:#C0C0C0;--silver3:#888;
  --white:#FFFFFF;--white2:#D8D8D8;
  --red:#e74c3c;--green:#2ecc71;--orange:#e67e22;
  --fd:'Cinzel',serif;--fb:'Montserrat',sans-serif;
  --bottom-bar:64px;--header-h:56px;
}
body{background:var(--bg);color:var(--white);font-family:var(--fb);font-size:16px;line-height:1.7;font-weight:500;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;padding-bottom:var(--bottom-bar);min-height:100vh}

/* SCREENS */
.screen{display:none;min-height:calc(100vh - var(--bottom-bar) - var(--header-h))}
.screen.active{display:block}

/* HEADER */
.app-header{position:sticky;top:0;z-index:100;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(6,6,6,.97);border-bottom:1px solid var(--g2);backdrop-filter:blur(10px)}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo-text{font-family:var(--fd);font-size:16px;letter-spacing:5px;color:var(--silver);font-weight:400}
.header-back{display:none;align-items:center;gap:6px;font-family:var(--fd);font-size:11px;letter-spacing:2px;color:var(--silver2);cursor:pointer;background:none;border:none}
.header-back.show{display:flex}
.header-title{font-family:var(--fd);font-size:13px;letter-spacing:3px;color:var(--white);display:none}
.header-title.show{display:block}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-bar);display:flex;background:rgba(6,6,6,.97);border-top:1px solid var(--g2);backdrop-filter:blur(10px);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:none;font-family:var(--fd);font-size:9px;letter-spacing:2px;color:var(--silver3);text-transform:uppercase;transition:color .2s;padding-bottom:env(safe-area-inset-bottom,0);position:relative}
.nav-item.active{color:var(--silver)}
.nav-item svg{opacity:.45;transition:opacity .2s}
.nav-item.active svg{opacity:1}
.nav-badge{position:absolute;top:6px;right:calc(50% - 20px);background:var(--red);color:#fff;font-size:9px;font-family:var(--fd);width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* HOME */
.hero-mini{padding:28px 20px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(192,192,192,.06),transparent 70%)}
.hero-title{font-family:var(--fd);font-size:36px;letter-spacing:12px;color:var(--white);font-weight:400;margin:14px 0 6px}
.hero-sub{font-family:var(--fb);font-size:14px;letter-spacing:2px;color:var(--silver2);margin-bottom:20px;font-weight:300}
.hero-rule{display:flex;align-items:center;gap:10px;width:100%;max-width:240px;margin:0 auto 20px}
.hero-rule-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--g3))}
.hero-rule-line.r{background:linear-gradient(to left,transparent,var(--g3))}
.hero-rule-dot{width:3px;height:3px;border-radius:50%;background:var(--silver3)}

/* Feature pills */
.features-row{display:flex;gap:8px;padding:0 16px;overflow-x:auto;scrollbar-width:none;margin-bottom:20px}
.features-row::-webkit-scrollbar{display:none}
.feature-pill{flex-shrink:0;background:var(--g1);border:1px solid var(--g2);padding:10px 16px;display:flex;align-items:center;gap:10px;border-radius:4px}
.feature-pill-text{font-size:13px;color:var(--silver2);line-height:1.45;font-weight:400}
.feature-pill-title{font-family:var(--fd);font-size:10px;letter-spacing:2px;color:var(--silver);display:block}

/* Promo */
.promo-banner{margin:0 16px 20px;background:var(--g1);border:1px solid var(--g2);padding:16px;position:relative;overflow:hidden}
.promo-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--silver3),transparent)}
.promo-corner{position:absolute;width:12px;height:12px;border-color:var(--g3);border-style:solid}
.promo-corner.tl{top:8px;left:8px;border-width:1px 0 0 1px}
.promo-corner.br{bottom:8px;right:8px;border-width:0 1px 1px 0}
.promo-num{font-family:var(--fd);font-size:42px;color:var(--silver3);font-weight:400;line-height:1}
.promo-label{font-family:var(--fd);font-size:13px;letter-spacing:3px;color:var(--white);margin:4px 0 8px;text-transform:uppercase}
.promo-desc{font-size:14px;color:var(--silver3);line-height:1.55;font-weight:400}

/* Quick actions */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--g2);margin:0 16px 20px}
.quick-action{background:var(--bg2);padding:16px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:background .2s;border:none;text-align:left}
.quick-action:hover{background:var(--bg3)}
.quick-action-title{font-family:var(--fd);font-size:11px;letter-spacing:2px;color:var(--silver);text-transform:uppercase}
.quick-action-sub{font-size:13px;color:var(--silver3);font-weight:400}

/* CATALOG */
.catalog-search{padding:12px 16px;position:sticky;top:var(--header-h);z-index:50;background:var(--bg);border-bottom:1px solid var(--g1)}
.search-input{width:100%;background:var(--g1);border:1px solid var(--g2);color:var(--white);padding:11px 16px;font-size:16px;font-family:var(--fb);outline:none;border-radius:4px;font-weight:400}
.search-input::placeholder{color:var(--silver3)}
.filter-scroll{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--g1)}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;font-family:var(--fd);font-size:9px;letter-spacing:2px;padding:6px 14px;border:1px solid var(--g2);color:var(--silver3);background:var(--bg2);cursor:pointer;white-space:nowrap;transition:all .2s}
.filter-chip.active{background:var(--silver);color:var(--bg);border-color:var(--silver)}
.product-item{display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid var(--g1);cursor:pointer;transition:background .2s;background:none;width:100%;text-align:left;border-left:none;border-right:none;border-top:none}
.product-item:hover{background:var(--g1)}
.product-thumb{width:72px;height:88px;background:var(--g1);flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;border:1px solid var(--g2)}
.product-thumb-s{font-family:var(--fd);font-size:28px;color:var(--g3)}
.product-item-badge{position:absolute;top:4px;left:4px;background:var(--silver);color:var(--bg);font-family:var(--fd);font-size:8px;letter-spacing:1px;padding:2px 6px}
.product-item-info{flex:1;min-width:0}
.product-item-brand{font-family:var(--fd);font-size:9px;letter-spacing:3px;color:var(--silver3);text-transform:uppercase;margin-bottom:4px}
.product-item-name{font-family:var(--fd);font-size:15px;letter-spacing:1px;color:var(--white);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-item-desc{font-size:13px;color:var(--silver3);line-height:1.55;margin-bottom:8px}
.product-item-price{font-family:var(--fd);font-size:19px;color:var(--white);font-weight:600}

/* PRODUCT DETAIL */
.product-detail-img{width:100%;aspect-ratio:1/1;background:var(--g1);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--g2)}
.product-detail-s{font-family:var(--fd);font-size:100px;color:var(--g2)}
.product-detail-body{padding:20px 16px}
.product-detail-brand{font-family:var(--fd);font-size:10px;letter-spacing:4px;color:var(--silver3);text-transform:uppercase;margin-bottom:8px}
.product-detail-name{font-family:var(--fd);font-size:22px;letter-spacing:2px;color:var(--white);margin-bottom:12px}
.product-detail-price{font-family:var(--fd);font-size:28px;color:var(--white);margin-bottom:16px}
.product-divider{height:1px;background:var(--g2);margin:16px 0}
.product-detail-desc{font-size:16px;color:var(--silver2);line-height:1.75;margin-bottom:16px;font-weight:400}
.product-detail-row{display:flex;gap:8px;margin-bottom:10px}
.product-detail-label{font-family:var(--fd);font-size:10px;letter-spacing:2px;color:var(--silver3);text-transform:uppercase;width:90px;flex-shrink:0;padding-top:2px}
.product-detail-val{font-size:15px;color:var(--white2);font-weight:400}
.btn-buy{width:100%;background:var(--silver);color:var(--bg);font-family:var(--fd);font-size:12px;letter-spacing:4px;border:none;padding:16px;cursor:pointer;margin-top:8px;transition:background .2s}
.btn-buy:hover{background:var(--white)}
.btn-tg{width:100%;background:transparent;color:var(--silver2);font-family:var(--fd);font-size:11px;letter-spacing:3px;border:1px solid var(--g3);padding:13px;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-tg:hover{border-color:var(--silver);color:var(--silver)}

/* ORDERS */
.orders-empty{padding:60px 24px;text-align:center}
.orders-empty-title{font-family:var(--fd);font-size:14px;letter-spacing:4px;color:var(--silver3);margin-bottom:10px}
.orders-empty-sub{font-size:14px;color:var(--silver3);font-style:italic}
.order-item{padding:16px;border-bottom:1px solid var(--g1);cursor:pointer;transition:background .2s}
.order-item:hover{background:var(--g1)}
.order-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.order-item-id{font-family:var(--fd);font-size:11px;letter-spacing:2px;color:var(--silver2)}
.order-item-product{font-size:15px;color:var(--white);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.order-item-date{font-size:13px;color:var(--silver3)}
.badge{font-family:var(--fd);font-size:8px;letter-spacing:2px;padding:4px 10px;text-transform:uppercase;white-space:nowrap}
.badge-new{background:var(--g2);color:var(--silver2)}
.badge-processing{background:rgba(230,126,34,.15);color:var(--orange);border:1px solid rgba(230,126,34,.3)}
.badge-shipping{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.badge-done{background:rgba(192,192,192,.1);color:var(--silver);border:1px solid var(--g3)}
.badge-cancelled{background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.3)}
.notif-dot{width:7px;height:7px;background:var(--red);border-radius:50%;display:inline-block;margin-left:6px;vertical-align:middle}

/* ORDER DETAIL */
.order-detail-wrap{padding:16px}
.order-status-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.order-card{background:var(--bg2);border:1px solid var(--g2);padding:16px;margin-bottom:16px;position:relative}
.order-card::before{content:'';position:absolute;top:8px;left:8px;width:10px;height:10px;border-top:1px solid var(--g3);border-left:1px solid var(--g3)}
.order-card::after{content:'';position:absolute;bottom:8px;right:8px;width:10px;height:10px;border-bottom:1px solid var(--g3);border-right:1px solid var(--g3)}
.ofield{display:grid;grid-template-columns:100px 1fr;gap:8px;margin-bottom:10px}
.ofield-label{font-family:var(--fd);font-size:9px;letter-spacing:2px;color:var(--silver3);text-transform:uppercase;padding-top:2px}
.ofield-value{font-size:15px;color:var(--white);font-weight:400}

/* CHAT */
.chat-section{background:var(--bg2);border:1px solid var(--g2);margin-bottom:80px}
.chat-header-row{padding:12px 16px;border-bottom:1px solid var(--g2);font-family:var(--fd);font-size:10px;letter-spacing:3px;color:var(--silver);text-transform:uppercase}
.chat-msgs{min-height:120px;max-height:280px;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:82%}
.chat-msg.own{align-self:flex-end}
.chat-meta{font-family:var(--fd);font-size:9px;letter-spacing:1px;color:var(--silver3);margin-bottom:4px}
.chat-msg.own .chat-meta{text-align:right}
.bubble{padding:11px 15px;font-size:15px;line-height:1.6}
.bubble-other{background:var(--g1);border:1px solid var(--g2);color:var(--white2);border-radius:0 8px 8px 8px}
.bubble-own{background:var(--g2);border:1px solid var(--g3);color:var(--white);border-radius:8px 0 8px 8px}
.bubble-system{background:transparent;border:1px solid var(--g2);color:var(--silver3);font-style:italic;border-radius:4px;font-size:12px;text-align:center;align-self:center;max-width:100%;padding:8px 12px}
.chat-input-row{display:flex;gap:1px;border-top:1px solid var(--g2)}
.chat-txt{flex:1;background:var(--bg);border:none;color:var(--white);padding:13px 14px;font-size:16px;font-family:var(--fb);outline:none;resize:none;font-weight:400}
.chat-btn{background:var(--silver);color:var(--bg);border:none;padding:0 18px;font-family:var(--fd);font-size:10px;letter-spacing:2px;cursor:pointer;white-space:nowrap}
.chat-btn:hover{background:var(--white)}

/* FORM */
.order-form{padding:16px}
.form-group{margin-bottom:16px}
.form-label{font-family:var(--fd);font-size:10px;letter-spacing:2px;color:var(--silver2);text-transform:uppercase;display:block;margin-bottom:8px}
.form-input{width:100%;background:var(--bg);border:1px solid var(--g2);color:var(--white);padding:13px 16px;font-size:16px;font-family:var(--fb);outline:none;transition:border-color .2s;font-weight:400}
.form-input:focus{border-color:var(--silver2)}
.form-textarea{width:100%;background:var(--bg);border:1px solid var(--g2);color:var(--white);padding:13px 16px;font-size:16px;font-family:var(--fb);outline:none;resize:vertical;min-height:80px;font-weight:400}
.form-textarea:focus{border-color:var(--silver2)}
.form-check{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;cursor:pointer}
.form-check input{margin-top:3px;accent-color:var(--silver);width:16px;height:16px;flex-shrink:0}
.form-check label{font-size:14px;color:var(--silver2);line-height:1.65;cursor:pointer;font-weight:400}
.btn-submit{width:100%;background:var(--silver);color:var(--bg);font-family:var(--fd);font-size:12px;letter-spacing:4px;border:none;padding:16px;cursor:pointer;margin-top:4px}
.btn-submit:hover{background:var(--white)}
.err-msg{font-size:12px;color:var(--red);margin-top:6px;font-family:var(--fd);letter-spacing:1px}

/* PROFILE */
.profile-wrap{padding:16px}
.profile-avatar{width:72px;height:72px;background:var(--g1);border:1px solid var(--g2);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-family:var(--fd);font-size:28px;color:var(--silver3)}
.profile-name{font-family:var(--fd);font-size:18px;letter-spacing:4px;color:var(--white);text-align:center;margin-bottom:4px}
.profile-email{font-size:13px;color:var(--silver3);text-align:center;margin-bottom:24px}
.profile-card{background:var(--bg2);border:1px solid var(--g2);padding:0 16px;margin-bottom:16px}
.profile-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--g1)}
.profile-row:last-child{border-bottom:none}
.profile-row-label{font-family:var(--fd);font-size:10px;letter-spacing:2px;color:var(--silver3);text-transform:uppercase}
.profile-row-val{font-size:15px;color:var(--white);font-weight:400}

/* SECTION TITLE */
.section-title{font-family:var(--fd);font-size:10px;letter-spacing:5px;color:var(--silver3);text-transform:uppercase;padding:16px 16px 8px}

/* TOAST */
#toast{position:fixed;top:70px;left:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{font-family:var(--fd);font-size:10px;letter-spacing:2px;padding:12px 16px;background:var(--bg2);color:var(--white);border:1px solid var(--g2);border-left:2px solid var(--silver);animation:slideIn .3s ease}
.toast-item.err{border-left-color:var(--red)}
.toast-item.ok{border-left-color:var(--green)}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.pb80{padding-bottom:80px}
.mt8{margin-top:8px}
.mt16{margin-top:16px}
</style>
</head>

    <svg width="22" height="28" viewBox="0 0 130 160" fill="none">

</div>

<div id="toast"></div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="hero-mini">
    <svg width="80" height="100" viewBox="0 0 130 160" fill="none">
      <path d="M32 80L32 52Q32 10 65 4Q98 10 98 52L98 80" stroke="#C0C0C0" stroke-width="2.5" fill="none"/>
      <path d="M42 80L42 55Q42 18 65 13Q88 18 88 55L88 80" stroke="#1e1e1e" stroke-width="1.2" fill="none"/>

      <polygon points="32,80 25,69 32,58 39,69" fill="#C0C0C0"/>
      <polygon points="98,80 91,69 98,58 105,69" fill="#C0C0C0"/>
      <circle cx="52" cy="14" r="7" fill="none" stroke="#C0C0C0" stroke-width="1.4"/>
      <circle cx="65" cy="8" r="7" fill="none" stroke="#C0C0C0" stroke-width="1.4"/>
      <circle cx="78" cy="14" r="7" fill="none" stroke="#C0C0C0" stroke-width="1.4"/>
      <rect x="16" y="78" width="98" height="74" rx="3" fill="#0D0D0D" stroke="#C0C0C0" stroke-width="2"/>
      <rect x="24" y="86" width="82" height="58" rx="2" fill="none" stroke="#1e1e1e" stroke-width="0.9"/>
      <circle cx="40" cy="115" r="9" fill="none" stroke="#2a2a2a" stroke-width="1"/>
      <circle cx="90" cy="115" r="9" fill="none" stroke="#2a2a2a" stroke-width="1"/>
      <path d="M30 90L36 96 M100 90L94 96 M30 148L36 142 M100 148L94 142" stroke="#2a2a2a" stroke-width="1.1" fill="none"/>
      <circle cx="65" cy="108" r="14" fill="#080808"/>
      <circle cx="65" cy="104" r="8" fill="none" stroke="#C0C0C0" stroke-width="1.5"/>

let currentCat='all';
let searchQuery='';
let navStack=['home'];
const mainScreens=['home','catalog','orders','profile'];

function navTo(screen){
  if(mainScreens.includes(screen)){
    navStack=[screen];
    setHeaderMode('logo');
    updateBottomNav(screen);
  }
  showScreen(screen);
  if(screen==='catalog')renderCatalog();
  if(screen==='orders')renderOrders();
  if(screen==='profile')renderProfile();
  updateOrderBadge();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const t=document.getElementById('screen-'+id);
  if(t)t.classList.add('active');
  window.scrollTo(0,0);
}

function pushScreen(id,title=''){
  navStack.push(id);
  setHeaderMode('back',title);
  showScreen(id);
}

function goBack(){
  if(navStack.length<=1)return;
  navStack.pop();
  const prev=navStack[navStack.length-1];
  if(mainScreens.includes(prev)){setHeaderMode('logo');updateBottomNav(prev);}
  else{const t={'new-order':'Новая заявка','order-detail':'Заявка','product':'Товар'};setHeaderMode('back',t[prev]||'')}
  showScreen(prev);
  if(prev==='orders')renderOrders();
  if(prev==='catalog')renderCatalog();
}

function setHeaderMode(mode,title=''){
  const back=document.getElementById('headerBack');
  const logo=document.getElementById('headerLogo');
  const titleEl=document.getElementById('headerTitle');
  if(mode==='logo'){back.classList.remove('show');logo.style.display='flex';titleEl.classList.remove('show');titleEl.textContent=''}
  else{back.classList.add('show');logo.style.display='none';if(title){titleEl.classList.add('show');titleEl.textContent=title}}
}

function updateBottomNav(active){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('nav-'+active);
  if(el)el.classList.add('active');
}

  const list=document.getElementById('catalogList');
  const filtered=PRODUCTS.filter(p=>{

    const ms=!searchQuery||p.name.toLowerCase().includes(searchQuery.toLowerCase())||p.brand.toLowerCase().includes(searchQuery.toLowerCase());
    return mc&&ms;
  });

        <span class="product-item-badge">NEW</span>

  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));

      <div class="chat-input-row">
        <textarea class="chat-txt" id="chatTxt" placeholder="Написать..." rows="2"></textarea>
        <button class="chat-btn" onclick="sendMsg('${id}')">ОТПРАВИТЬ</button>
      </div>
    </div>`;
  pushScreen('order-detail','Заявка #'+id.slice(-6).toUpperCase());
  setTimeout(()=>{const c=document.getElementById('chatMsgs');if(c)c.scrollTop=c.scrollHeight},60);
}

function sendMsg(orderId){
  const txt=document.getElementById('chatTxt').value.trim();
  if(!txt)return;
  const orders=gOrders();
  const order=orders.find(o=>o.id===orderId);
  if(!order)return;
  if(!order.msgs)order.msgs=[];
  order.msgs.push({role:'client',text:txt,time:now(),rc:true});
  sOrders(orders);
  document.getElementById('chatTxt').value='';
  const msgs=order.msgs.map(m=>`
    <div class="chat-msg ${m.role==='client'?'own':''}">
      <div class="chat-meta">${m.role==='client'?'Вы':'SECRETLY'} · ${m.time}</div>
      <div class="bubble ${m.is_system?'bubble-system':m.role==='client'?'bubble-own':'bubble-other'}">${esc(m.text)}</div>
    </div>`).join('');
  const c=document.getElementById('chatMsgs');
  if(c){c.innerHTML=msgs;c.scrollTop=c.scrollHeight}
  toast('Отправлено');
}

function openNewOrder(){pushScreen('new-order','Новая заявка')}

function submitOrder(){
  const product=document.getElementById('o-product').value.trim();
  const fio=document.getElementById('o-fio').value.trim();
  const phone=document.getElementById('o-phone').value.trim();
  const addr=document.getElementById('o-addr').value.trim();
  const pvz=document.getElementById('o-pvz').value.trim();
  const comment=document.getElementById('o-comment').value.trim();
  const pdp=document.getElementById('o-pdp').checked;
  ['product','fio','phone','addr','pvz','pdp'].forEach(k=>{const el=document.getElementById('err-'+k);if(el)el.textContent=''});
  let ok=true;
  if(!product){document.getElementById('err-product').textContent='Укажите товар';ok=false}
  if(!fio){document.getElementById('err-fio').textContent='Укажите ФИО';ok=false}
  if(!phone){document.getElementById('err-phone').textContent='Укажите телефон';ok=false}
  if(!addr){document.getElementById('err-addr').textContent='Укажите адрес ПВЗ';ok=false}
  if(!pvz){document.getElementById('err-pvz').textContent='Укажите название ПВЗ';ok=false}
  if(!pdp){document.getElementById('err-pdp').textContent='Необходимо согласие на обработку данных';ok=false}
  if(!ok)return;
  const orders=gOrders();
  orders.push({id:uid(),userId:tgUser.id,userName,product,fio,phone,pvzAddr:addr,pvzName:pvz,comment,status:'new',createdAt:now(),msgs:[]});
  sOrders(orders);
  sendToTelegram(order);
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  toast('Заявка отправлена!','ok');
  ['o-product','o-fio','o-phone','o-addr','o-pvz','o-comment'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
  document.getElementById('o-pdp').checked=false;
  setTimeout(()=>navTo('orders'),600);
}

function renderProfile(){
  const orders=gOrders();
  document.getElementById('profileContent').innerHTML=`
    <div class="profile-wrap pb80">
      <div class="profile-avatar">${userName.charAt(0).toUpperCase()}</div>
      <div class="profile-name">${userName}</div>
      <div class="profile-email">${userHandle||'Telegram пользователь'}</div>
      <div class="profile-card">
        <div class="profile-row"><span class="profile-row-label">Заявок</span><span class="profile-row-val">${orders.length}</span></div>
        <div class="profile-row"><span class="profile-row-label">Новых</span><span class="profile-row-val">${orders.filter(o=>o.status==='new').length}</span></div>
        <div class="profile-row"><span class="profile-row-label">Завершено</span><span class="profile-row-val">${orders.filter(o=>o.status==='done').length}</span></div>
      </div>
      <div class="section-title" style="padding-left:0">Контакты</div>
      <div class="profile-card">
        <div class="profile-row" onclick="openTelegram()" style="cursor:pointer">
          <span class="profile-row-label">Telegram</span>
          <span class="profile-row-val" style="color:var(--silver)">@secretlyshop ↗</span>
        </div>
        <div class="profile-row"><span class="profile-row-label">Авито</span><span class="profile-row-val">SECRETLY</span></div>
      </div>
      <div class="section-title" style="padding-left:0">Акции</div>
      <div class="profile-card">
        <div class="profile-row"><span class="profile-row-label">От 2 товаров</span><span class="profile-row-val" style="color:var(--silver)">Скидка 5%</span></div>
        <div class="profile-row"><span class="profile-row-label">За отзыв</span><span class="profile-row-val" style="color:var(--silver)">Скидка 7%</span></div>
      </div>
      <button class="btn-tg mt16" onclick="openTelegram()">↗ Открыть @secretlyshop</button>
    </div>`;
}

function openTelegram(){
  if(tg){tg.openLink('https://t.me/secretlyshop')}
  else{window.open('https://t.me/secretlyshop','_blank')}
}

function updateOrderBadge(count){
  if(count===undefined){const o=gOrders();count=o.filter(x=>x.msgs&&x.msgs.some(m=>m.role!=='client'&&!m.rc)).length}
  const b=document.getElementById('ordersBadge');
  if(count>0){b.textContent=count;b.style.display='flex'}else{b.style.display='none'}
}

function toast(msg,type=''){
  const w=document.getElementById('toast');
  const el=document.createElement('div');
  el.className='toast-item'+(type?' '+type:'');
  el.textContent=msg;
  w.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

initDB();
updateOrderBadge();
</script>
</body>
</html>
