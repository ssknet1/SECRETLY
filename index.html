<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="format-detection" content="telephone=no"/>
<title>SECRETLY</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ══ RESET ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}

/* ══ TOKENS — адаптируются под тему Telegram ══ */
:root{
  --bg:         #060606;
  --bg2:        #0D0D0D;
  --bg3:        #141414;
  --g1:         #1a1a1a;
  --g2:         #2a2a2a;
  --g3:         #3a3a3a;
  --silver:     #C0C0C0;
  --silver2:    #888;
  --silver3:    #555;
  --white:      #F0F0F0;
  --white2:     #aaa;
  --accent:     #C0C0C0;
  --red:        #e74c3c;
  --green:      #2ecc71;
  --orange:     #e67e22;
  --fd:         'Cinzel', serif;
  --fb:         'Raleway', sans-serif;
  --bottom-bar: 64px;
  --header-h:   56px;
}

body{
  background:var(--bg);
  color:var(--white);
  font-family:var(--fb);
  font-size:15px;
  line-height:1.6;
  -webkit-tap-highlight-color:transparent;
  padding-bottom:var(--bottom-bar);
  min-height:100vh;
}

/* ══ SCREENS ══ */
.screen{display:none;min-height:calc(100vh - var(--bottom-bar) - var(--header-h))}
.screen.active{display:block}

/* ══ HEADER ══ */
.app-header{
  position:sticky;top:0;z-index:100;
  height:var(--header-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(6,6,6,.97);
  border-bottom:1px solid var(--g2);
  backdrop-filter:blur(10px);
}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo-text{font-family:var(--fd);font-size:16px;letter-spacing:5px;color:var(--silver);font-weight:400}
.header-back{display:none;align-items:center;gap:6px;font-family:var(--fd);font-size:11px;letter-spacing:2px;color:var(--silver2);cursor:pointer;background:none;border:none;color:var(--silver2)}
.header-back.show{display:flex}
.header-title{font-family:var(--fd);font-size:13px;letter-spacing:3px;color:var(--white);display:none}
.header-title.show{display:block}

/* ══ BOTTOM NAV ══ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bottom-bar);
  display:flex;
  background:rgba(6,6,6,.97);
  border-top:1px solid var(--g2);
  backdrop-filter:blur(10px);
  z-index:100;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;border:none;background:none;
  font-family:var(--fd);font-size:9px;letter-spacing:2px;color:var(--silver3);
  text-transform:uppercase;transition:color .2s;
  padding-bottom:env(safe-area-inset-bottom,0);
  position:relative;
}
.nav-item.active{color:var(--silver)}
.nav-item svg{transition:opacity .2s}
.nav-item.active svg{opacity:1}
.nav-item svg{opacity:.45}
.nav-badge{
  position:absolute;top:6px;right:calc(50% - 18px);
  background:var(--red);color:#fff;
  font-size:9px;font-family:var(--fd);
  width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}

/* ══ HOME SCREEN ══ */
.hero-mini{
  padding:28px 20px 20px;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(192,192,192,.06),transparent 70%);
}
.hero-title{font-family:var(--fd);font-size:36px;letter-spacing:12px;color:var(--white);font-weight:400;margin:14px 0 6px}
.hero-sub{font-family:var(--fb);font-style:italic;font-size:14px;letter-spacing:2px;color:var(--silver2);margin-bottom:20px}
.hero-rule{display:flex;align-items:center;gap:10px;width:100%;max-width:240px;margin:0 auto 20px}
.hero-rule-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--g3))}
.hero-rule-line.r{background:linear-gradient(to left,transparent,var(--g3))}
.hero-rule-dot{width:3px;height:3px;border-radius:50%;background:var(--silver3)}

/* Feature pills */
.features-row{display:flex;gap:8px;padding:0 16px;overflow-x:auto;scrollbar-width:none;margin-bottom:20px}
.features-row::-webkit-scrollbar{display:none}
.feature-pill{flex-shrink:0;background:var(--g1);border:1px solid var(--g2);padding:10px 16px;display:flex;align-items:center;gap:8px;border-radius:4px}
.feature-pill-icon{font-size:18px}
.feature-pill-text{font-size:12px;color:var(--silver2);line-height:1.4}
.feature-pill-title{font-family:var(--fd);font-size:10px;letter-spacing:2px;color:var(--silver);display:block}

/* Promo banner */
.promo-banner{
  margin:0 16px 20px;
  background:var(--g1);border:1px solid var(--g2);
  padding:16px;
  position:relative;overflow:hidden;
}
.promo-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--silver3),transparent)}
.promo-corner{position:absolute;width:12px;height:12px;border-color:var(--g3);border-style:solid}
.promo-corner.tl{top:8px;left:8px;border-width:1px 0 0 1px}
.promo-corner.br{bottom:8px;right:8px;border-width:0 1px 1px 0}
.promo-num{font-family:var(--fd);font-size:42px;color:var(--silver3);font-weight:400;line-height:1}
.promo-label{font-family:var(--fd);font-size:13px;letter-spacing:3px;color:var(--white);margin:4px 0 8px}
.promo-desc{font-size:13px;color:var(--silver3);line-height:1.5}

/* Quick actions */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--g2);margin:0 16px 20px}
.quick-action{background:var(--bg2);padding:16px;display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:background .2s;border:none;text-align:left}
.quick-action:hover{background:var(--bg3)}
.quick-action-icon{font-size:22px}
.quick-action-title{font-family:var(--fd);font-size:11px;letter-spacing:2px;color:var(--silver);text-transform:uppercase}
.quick-action-sub{font-size:12px;color:var(--silver3)}

/* ══ CATALOG SCREEN ══ */
.catalog-search{padding:12px 16px;position:sticky;top:var(--header-h);z-index:50;background:var(--bg);border-bottom:1px solid var(--g1)}
.search-input{width:100%;background:var(--g1);border:1px solid var(--g2);color:var(--white);padding:10px 16px;font-size:15px;font-family:var(--fb);outline:none;border-radius:4px}
.search-input::placeholder{color:var(--silver3)}
.filter-scroll{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--g1)}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;font-family:var(--fd);font-size:9px;letter-spacing:2px;padding:6px 14px;border:1px solid var(--g2);color:var(--silver3);background:var(--bg2);cursor:pointer;white-space:nowrap;transition:all .2s}
.filter-chip.active{background:var(--silver);color:var(--bg);border-color:var(--silver)}
.catalog-list{padding:0}
.product-item{display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid var(--g1);cursor:pointer;transition:background .2s;background:none;width:100%;text-align:left;border-left:none;border-right:none;border-top:none}
.product-item:hover{background:var(--g1)}
.product-thumb{width:72px;height:88px;background:var(--g1);flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;border:1px solid var(--g2)}
.product-thumb-s{font-family:var(--fd);font-size:28px;color:var(--g3)}
.product-item-badge{position:absolute;top:4px;left:4px;background:var(--silver);color:var(--bg);font-family:var(--fd);font-size:8px;letter-spacing:1px;padding:2px 6px}
.product-item-info{flex:1;min-width:0}
.product-item-brand{font-family:var(--fd);font-size:9px;letter-spacing:3px;color:var(--silver3);text-transform:uppercase;margin-bottom:4px}
.product-item-name{font-family:var(--fd);font-size:14px;letter-spacing:1px;color:var(--white);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-item-desc{font-size:12px;color:var(--silver3);line-height:1.5;margin-bottom:8px}
.product-item-price{font-family:var(--fd);font-size:18px;color:var(--white)}

/* ══ PRODUCT DETAIL ══ */
.product-detail{padding:0}
.product-detail-img{width:100%;aspect-ratio:1/1;background:var(--g1);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--g2)}
.product-detail-s{font-family:var(--fd);font-size:100px;color:var(--g2)}
.product-detail-body{padding:20px 16px}
.product-detail-brand{font-family:var(--fd);font-size:10px;letter-spacing:4px;color:var(--silver3);text-transform:uppercase;margin-bottom:8px}
.product-detail-name{font-family:var(--fd);font-size:22px;letter-spacing:2px;color:var(--white);margin-bottom:12px}
.product-detail-price{font-family:var(--fd);font-size:28px;color:var(--white);margin-bottom:16px}
.product-divider{height:1px;background:var(--g2);margin:16px 0}
.product-detail-desc{font-size:14px;color:var(--silver2);line-height:1.7;margin-bottom:16px}
.product-detail-row{display:flex;gap:8px;margin-bottom:8px}
.product-detail-label{font-family:var(--fd);font-size:10px;letter-spacing:2px;color:var(--silver3);text-transform:uppercase;width:90px;flex-shrink:0;padding-top:2px}
.product-detail-val{font-size:14px;color:var(--white2)}
.btn-buy{width:100%;background:var(--silver);color:var(--bg);font-family:var(--fd);font-size:12px;letter-spacing:4px;border:none;padding:16px;cursor:pointer;margin-top:8px;transition:background .2s}
.btn-buy:hover{background:var(--white)}
.btn-tg{width:100%;background:transparent;color:var(--silver2);font-family:var(--fd);font-size:11px;letter-spacing:3px;border:1px solid var(--g3);padding:13px;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-tg:hover{border-color:var(--silver);color:var(--silver)}

/* ══ ORDERS SCREEN ══ */
.orders-empty{padding:60px 24px;text-align:center}
.orders-empty-title{font-family:var(--fd);font-size:14px;letter-spacing:4px;color:var(--silver3);margin-bottom:10px}
.orders-empty-sub{font-size:14px;color:var(--silver3);font-style:italic}
.order-item{padding:16px;border-bottom:1px solid var(--g1);cursor:pointer;transition:background .2s}
.order-item:hover{background:var(--g1)}
.order-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.order-item-id{font-family:var(--fd);font-size:11px;letter-spacing:2px;color:var(--silver2)}
.order-item-product{font-size:14px;color:var(--white);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-item-date{font-size:12px;color:var(--silver3)}
.badge{font-family:var(--fd);font-size:8px;letter-spacing:2px;padding:4px 10px;text-transform:uppercase;white-space:nowrap}
.badge-new{background:var(--g2);color:var(--silver2)}
.badge-processing{background:rgba(230,126,34,.15);color:var(--orange);border:1px solid rgba(230,126,34,.3)}
.badge-shipping{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.badge-done{background:rgba(192,192,192,.1);color:var(--silver);border:1px solid var(--g3)}
.badge-cancelled{background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.3)}
.notif-dot{width:7px;height:7px;background:var(--red);border-radius:50%;display:inline-block;margin-left:6px;vertical-align:middle}

/* ══ ORDER DETAIL ══ */
.order-detail-wrap{padding:16px}
.order-status-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.order-card{background:var(--bg2);border:1px solid var(--g2);padding:16px;margin-bottom:16px;position:relative}
.order-card::before{content:'';position:absolute;top:8px;left:8px;width:10px;height:10px;border-top:1px solid var(--g3);border-left:1px solid var(--g3)}
.order-card::after{content:'';position:absolute;bottom:8px;right:8px;width:10px;height:10px;border-bottom:1px solid var(--g3);border-right:1px solid var(--g3)}
.ofield{display:grid;grid-template-columns:100px 1fr;gap:8px;margin-bottom:10px}
.ofield-label{font-family:var(--fd);font-size:9px;letter-spacing:2px;color:var(--silver3);text-transform:uppercase;padding-top:2px}
.ofield-value{font-size:14px;color:var(--white)}

/* ══ CHAT ══ */
.chat-section{background:var(--bg2);border:1px solid var(--g2);margin-bottom:80px}
.chat-header-row{padding:12px 16px;border-bottom:1px solid var(--g2);font-family:var(--fd);font-size:10px;letter-spacing:3px;color:var(--silver);text-transform:uppercase}
.chat-msgs{min-height:120px;max-height:280px;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:82%}
.chat-msg.own{align-self:flex-end}
.chat-meta{font-family:var(--fd);font-size:9px;letter-spacing:1px;color:var(--silver3);margin-bottom:4px}
.chat-msg.own .chat-meta{text-align:right}
.bubble{padding:10px 14px;font-size:14px;line-height:1.5}
.bubble-other{background:var(--g1);border:1px solid var(--g2);color:var(--white2);border-radius:0 8px 8px 8px}
.bubble-own{background:var(--g2);border:1px solid var(--g3);color:var(--white);border-radius:8px 0 8px 8px}
.bubble-system{background:transparent;border:1px solid var(--g2);color:var(--silver3);font-style:italic;border-radius:4px;font-size:12px;text-align:center;align-self:center;max-width:100%;padding:8px 12px}
.chat-input-row{display:flex;gap:1px;border-top:1px solid var(--g2)}
.chat-txt{flex:1;background:var(--bg);border:none;color:var(--white);padding:12px 14px;font-size:14px;font-family:var(--fb);outline:none;resize:none}
.chat-btn{background:var(--silver);color:var(--bg);border:none;padding:0 18px;font-family:var(--fd);font-size:10px;letter-spacing:2px;cursor:pointer;white-space:nowrap}
.chat-btn:hover{background:var(--white)}

/* ══ NEW ORDER FORM ══ */
.order-form{padding:16px}
.form-group{margin-bottom:16px}
.form-label{font-family:var(--fd);font-size:10px;letter-spacing:3px;color:var(--silver3);text-transform:uppercase;display:block;margin-bottom:6px}
.form-input{width:100%;background:var(--bg);border:1px solid var(--g2);color:var(--white);padding:12px 14px;font-size:15px;font-family:var(--fb);outline:none;transition:border-color .2s;border-radius:0}
.form-input:focus{border-color:var(--silver2)}
.form-textarea{width:100%;background:var(--bg);border:1px solid var(--g2);color:var(--white);padding:12px 14px;font-size:15px;font-family:var(--fb);outline:none;resize:vertical;min-height:80px;border-radius:0}
.form-textarea:focus{border-color:var(--silver2)}
.form-check{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;cursor:pointer}
.form-check input{margin-top:3px;accent-color:var(--silver);width:16px;height:16px;flex-shrink:0}
.form-check label{font-size:13px;color:var(--silver2);line-height:1.6;cursor:pointer}
.btn-submit{width:100%;background:var(--silver);color:var(--bg);font-family:var(--fd);font-size:12px;letter-spacing:4px;border:none;padding:16px;cursor:pointer;margin-top:4px}
.btn-submit:hover{background:var(--white)}
.err-msg{font-size:12px;color:var(--red);margin-top:6px;font-family:var(--fd);letter-spacing:1px}

/* ══ PROFILE SCREEN ══ */
.profile-wrap{padding:16px}
.profile-avatar{width:72px;height:72px;background:var(--g1);border:1px solid var(--g2);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-family:var(--fd);font-size:28px;color:var(--silver3)}
.profile-name{font-family:var(--fd);font-size:18px;letter-spacing:4px;color:var(--white);text-align:center;margin-bottom:4px}
.profile-email{font-size:13px;color:var(--silver3);text-align:center;margin-bottom:24px}
.profile-card{background:var(--bg2);border:1px solid var(--g2);padding:16px;margin-bottom:16px}
.profile-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--g1)}
.profile-row:last-child{border-bottom:none}
.profile-row-label{font-family:var(--fd);font-size:10px;letter-spacing:2px;color:var(--silver3);text-transform:uppercase}
.profile-row-val{font-size:14px;color:var(--white)}
.btn-logout{width:100%;background:transparent;color:var(--red);font-family:var(--fd);font-size:11px;letter-spacing:3px;border:1px solid rgba(231,76,60,.3);padding:13px;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-logout:hover{background:rgba(231,76,60,.1)}

/* ══ AUTH SCREEN ══ */
.auth-wrap{padding:32px 20px}
.auth-box{background:var(--bg2);border:1px solid var(--g2);padding:28px 20px;position:relative}
.auth-box::before{content:'';position:absolute;top:10px;left:10px;width:12px;height:12px;border-top:1px solid var(--g3);border-left:1px solid var(--g3)}
.auth-box::after{content:'';position:absolute;bottom:10px;right:10px;width:12px;height:12px;border-bottom:1px solid var(--g3);border-right:1px solid var(--g3)}
.auth-title{font-family:var(--fd);font-size:18px;letter-spacing:4px;color:var(--white);margin-bottom:6px;text-align:center}
.auth-sub{font-family:var(--fb);font-style:italic;font-size:13px;color:var(--silver2);text-align:center;margin-bottom:24px}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--silver2)}
.auth-switch span{color:var(--silver);cursor:pointer;text-decoration:underline}

/* ══ SECTION TITLE ══ */
.section-title{font-family:var(--fd);font-size:10px;letter-spacing:5px;color:var(--silver3);text-transform:uppercase;padding:16px 16px 8px}

/* ══ DIVIDER ══ */
.g-div{display:flex;align-items:center;margin:4px 16px 0}
.g-div-line{flex:1;height:1px;background:var(--g2)}
.g-div-dot{width:5px;height:5px;border:1px solid var(--g3);transform:rotate(45deg);margin:0 10px}

/* ══ TOAST ══ */
#toast{position:fixed;top:70px;left:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{font-family:var(--fd);font-size:10px;letter-spacing:2px;padding:12px 16px;background:var(--bg2);color:var(--white);border:1px solid var(--g2);border-left:2px solid var(--silver);animation:slideIn .3s ease}
.toast-item.err{border-left-color:var(--red)}
.toast-item.ok{border-left-color:var(--green)}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ══ UTILS ══ */
.mt8{margin-top:8px}
.mt16{margin-top:16px}
.pb80{padding-bottom:80px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <button class="header-back" id="headerBack" onclick="goBack()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Назад
  </button>
  <div class="header-logo" id="headerLogo">
    <svg width="22" height="28" viewBox="0 0 130 160" fill="none">
      <path d="M32 80L32 52Q32 10 65 4Q98 10 98 52L98 80" stroke="#C0C0C0" stroke-width="3" fill="none"/>
      <polygon points="65,4 58,-5 65,-14 72,-5" fill="#C0C0C0"/>
      <polygon points="32,80 25,69 32,58 39,69" fill="#C0C0C0"/>
      <polygon points="98,80 91,69 98,58 105,69" fill="#C0C0C0"/>
      <rect x="16" y="78" width="98" height="74" rx="3" fill="#0D0D0D" stroke="#C0C0C0" stroke-width="2.2"/>
      <circle cx="65" cy="104" r="8" fill="none" stroke="#C0C0C0" stroke-width="1.6"/>
      <path d="M59 109L59 122Q59 126 65 126Q71 126 71 122L71 109" fill="none" stroke="#C0C0C0" stroke-width="1.6"/>
    </svg>
    <span class="header-logo-text">SECRETLY</span>
  </div>
  <div class="header-title" id="headerTitle"></div>
  <div style="width:60px"></div>
</div>

<div id="toast"></div>

<!-- ═══════════════════════════════════ -->
<!-- SCREEN: HOME                       -->
<!-- ═══════════════════════════════════ -->
<div class="screen active" id="screen-home">
  <div class="hero-mini">
    <svg width="72" height="90" viewBox="0 0 130 160" fill="none">
      <path d="M32 80L32 52Q32 10 65 4Q98 10 98 52L98 80" stroke="#C0C0C0" stroke-width="2.5" fill="none"/>

<script>
// ═══ TELEGRAM WEB APP ═══
const tg = window.Telegram?.WebApp;
if(tg){
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#060606');
  tg.setBackgroundColor('#060606');
}

// ═══ DATA ═══
const DB = {
  g(k){try{return JSON.parse(localStorage.getItem('sc_'+k))}catch{return null}},
  s(k,v){localStorage.setItem('sc_'+k,JSON.stringify(v))},
};
function initDB(){
  if(!DB.g('orders')) DB.s('orders',[]);
}
const gOrders = () => DB.g('orders')||[];
const sOrders = o => DB.s('orders',o);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const now = () => new Date().toLocaleString('ru-RU');
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';

// Get TG user info
const tgUser = tg?.initDataUnsafe?.user || {id: 'local', first_name: 'Пользователь', username: 'user'};
const userName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') || 'Пользователь';
const userHandle = tgUser.username ? '@'+tgUser.username : '';

// ═══ STATUS ═══
const SL = {new:'Новая',processing:'В обработке',shipping:'Отправлено',done:'Завершена',cancelled:'Отменена'};
const SC = {new:'badge-new',processing:'badge-processing',shipping:'badge-shipping',done:'badge-done',cancelled:'badge-cancelled'};
const badge = s => `<span class="badge ${SC[s]||'badge-new'}">${SL[s]||s}</span>`;

// ═══ CATALOG DATA ═══
const PRODUCTS = [
  {id:1,brand:'Supreme',name:'Box Logo Hoodie',desc:'Оригинал. Размер L. Состояние 10/10. Цвет белый. Материал — тяжёлый хлопок 580gsm.',price:'14 900 ₽',cat:'streetwear',badge:'NEW',size:'L',condition:'10/10'},
  {id:2,brand:'Amiri',name:'MX1 Jeans',desc:'Оригинал. Размер 32. Без следов носки. Классические байкерские джинсы с кожаными вставками.',price:'38 000 ₽',cat:'luxury',badge:'HOT',size:'32',condition:'10/10'},
  {id:3,brand:'BAPE',name:'Sta Low White Camo',desc:'Оригинал. 42 EU. Носились 2 раза. Культовые кроссовки в камуфляже.',price:'22 500 ₽',cat:'footwear',badge:'',size:'42 EU',condition:'9/10'},
  {id:4,brand:'Saint Laurent',name:'Slim-fit Trousers',desc:'Оригинал. Размер 50IT. Состояние 9/10. Тонкая шерсть.',price:'28 000 ₽',cat:'luxury',badge:'-10%',size:'50IT',condition:'9/10'},
  {id:5,brand:'Palace',name:'Tri-Ferg Tee',desc:'Оригинал. Размер M. Без дефектов. Хлопок 100%.',price:'6 500 ₽',cat:'streetwear',badge:'',size:'M',condition:'10/10'},
  {id:6,brand:'Gucci',name:'GG Belt Black',desc:'Оригинал. 95 см. Состояние 10/10. Коробка и документы.',price:'19 900 ₽',cat:'accessories',badge:'NEW',size:'95 см',condition:'10/10'},
  {id:7,brand:'Stone Island',name:'Shadow Project Hoodie',desc:'Оригинал. Размер XL. 2 раза. Редкая коллаборация.',price:'32 000 ₽',cat:'streetwear',badge:'',size:'XL',condition:'9/10'},
  {id:8,brand:'Rick Owens',name:'DRKSHDW Cargo',desc:'Оригинал. Размер 48IT. Без следов. Тяжёлый хлопок.',price:'45 000 ₽',cat:'luxury',badge:'',size:'48IT',condition:'10/10'},
];

let currentCat = 'all';
let searchQuery = '';

// ═══ NAVIGATION ═══
let navStack = ['home'];
const mainScreens = ['home','catalog','orders','profile'];

function navTo(screen){
  // Reset sub-screens
  if(mainScreens.includes(screen)){
    navStack = [screen];
    setHeaderMode('logo');
    updateBottomNav(screen);
  }
  showScreen(screen);
  if(screen==='catalog') renderCatalog();
  if(screen==='orders') renderOrders();
  if(screen==='profile') renderProfile();
  updateOrderBadge();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const t = document.getElementById('screen-'+id);
  if(t) t.classList.add('active');
  window.scrollTo(0,0);
}

function pushScreen(id, title=''){
  navStack.push(id);
  setHeaderMode('back', title);
  showScreen(id);
}

function goBack(){
  if(navStack.length <= 1){ return; }
  navStack.pop();
  const prev = navStack[navStack.length-1];
  if(mainScreens.includes(prev)){
    setHeaderMode('logo');
    updateBottomNav(prev);
  } else {
    const titles = {'new-order':'Новая заявка','order-detail':'Заявка','product':'Товар'};
    setHeaderMode('back', titles[prev]||'');
  }
  showScreen(prev);
  if(prev==='orders') renderOrders();
  if(prev==='catalog') renderCatalog();
}

function setHeaderMode(mode, title=''){
  const back = document.getElementById('headerBack');
  const logo = document.getElementById('headerLogo');
  const titleEl = document.getElementById('headerTitle');
  if(mode==='logo'){
    back.classList.remove('show');
    logo.style.display='flex';
    titleEl.classList.remove('show');
    titleEl.textContent='';
  } else {
    back.classList.add('show');
    logo.style.display='none';
    if(title){
      titleEl.classList.add('show');
      titleEl.textContent=title;
    }
  }
}

function updateBottomNav(active){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('nav-'+active);
  if(el) el.classList.add('active');
}

// ═══ CATALOG ═══
function renderCatalog(){
  const list = document.getElementById('catalogList');
  const filtered = PRODUCTS.filter(p=>{
    const matchCat = currentCat==='all' || p.cat===currentCat;
    const matchSearch = !searchQuery || p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.brand.toLowerCase().includes(searchQuery.toLowerCase());
    return matchCat && matchSearch;
  });

  if(filtered.length===0){
    list.innerHTML=`<div style="padding:40px;text-align:center;font-style:italic;color:var(--silver3)">Ничего не найдено</div>`;
    return;
  }

  list.innerHTML = filtered.map(p=>`
    <button class="product-item" onclick="openProduct(${p.id})">
      <div class="product-thumb">
        <span class="product-thumb-s">S</span>
        ${p.badge?`<span class="product-item-badge">${p.badge}</span>`:''}
      </div>
      <div class="product-item-info">
        <div class="product-item-brand">${p.brand}</div>
        <div class="product-item-name">${p.name}</div>
        <div class="product-item-desc">${p.desc.slice(0,60)}...</div>
        <div class="product-item-price">${p.price}</div>
      </div>
    </button>`).join('');
}

function setCat(el){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentCat = el.dataset.cat;
  renderCatalog();
}

function filterProducts(){
  searchQuery = document.getElementById('searchInput').value;
  renderCatalog();
}

// ═══ PRODUCT DETAIL ═══
function openProduct(id){
  const p = PRODUCTS.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('productDetail').innerHTML=`
    <div class="product-detail-img">
      <span class="product-detail-s">S</span>
    </div>
    <div class="product-detail-body">
      ${p.badge?`<span class="badge badge-new" style="margin-bottom:12px;display:inline-block">${p.badge}</span>`:''}
      <div class="product-detail-brand">${p.brand}</div>
      <div class="product-detail-name">${p.name}</div>
      <div class="product-detail-price">${p.price}</div>
      <div class="product-divider"></div>
      <div class="product-detail-desc">${p.desc}</div>
      <div class="product-detail-row"><span class="product-detail-label">Размер</span><span class="product-detail-val">${p.size}</span></div>
      <div class="product-detail-row"><span class="product-detail-label">Состояние</span><span class="product-detail-val">${p.condition}</span></div>
      <div class="product-detail-row"><span class="product-detail-label">Категория</span><span class="product-detail-val">${{streetwear:'Streetwear',luxury:'Люкс',footwear:'Обувь',accessories:'Аксессуары'}[p.cat]}</span></div>
      <div class="product-divider"></div>
      <button class="btn-buy" onclick="orderProduct('${esc(p.brand)} ${esc(p.name)}, ${p.price}')">ОФОРМИТЬ ЗАЯВКУ</button>
      <button class="btn-tg" onclick="openTelegram()">↗ Написать в Telegram</button>
    </div>`;
  pushScreen('product', p.name);
}

function orderProduct(product){
  document.getElementById('o-product').value = product;
  openNewOrder();
}

// ═══ ORDERS ═══
function renderOrders(){
  const orders = gOrders().reverse();
  const unread = orders.filter(o=>o.msgs&&o.msgs.some(m=>m.role!=='client'&&!m.rc)).length;
  updateOrderBadge(unread);

  const el = document.getElementById('ordersList');
  if(orders.length===0){
    el.innerHTML=`
      <div class="orders-empty">
        <div class="orders-empty-title">НЕТ ЗАЯВОК</div>
        <div class="orders-empty-sub">Создайте первую заявку</div>
        <button class="btn-buy" style="margin-top:20px;max-width:240px;margin-left:auto;margin-right:auto" onclick="openNewOrder()">Новая заявка</button>
      </div>`;
    return;
  }

  el.innerHTML = orders.map(o=>`
    <div class="order-item" onclick="openOrderDetail('${o.id}')">
      <div class="order-item-top">
        <span class="order-item-id">#${o.id.slice(-6).toUpperCase()}</span>
        ${badge(o.status)}
        ${o.msgs&&o.msgs.some(m=>m.role!=='client'&&!m.rc)?'<span class="notif-dot"></span>':''}
      </div>
      <div class="order-item-product">${esc(o.product).slice(0,50)}</div>
      <div class="order-item-date">${o.createdAt}</div>
    </div>`).join('');
}

function openOrderDetail(id){
  const orders = gOrders();
  const order = orders.find(o=>o.id===id);
  if(!order) return;

  // Mark as read
  order.msgs.forEach(m=>{if(m.role!=='client') m.rc=true});
  sOrders(orders);

  const msgs = order.msgs.map(m=>`
    <div class="chat-msg ${m.role==='client'?'own':''}">
      <div class="chat-meta">${m.role==='client'?'Вы':'SECRETLY'} · ${m.time}</div>
      <div class="bubble ${m.is_system?'bubble-system':m.role==='client'?'bubble-own':'bubble-other'}">${esc(m.text)}</div>
    </div>`).join('');

  document.getElementById('orderDetailContent').innerHTML=`
    <div class="order-status-row">
      ${badge(order.status)}
      <span style="font-size:12px;color:var(--silver3)">${order.createdAt}</span>
    </div>
    <div class="order-card">
      <div class="ofield"><span class="ofield-label">Товар</span><span class="ofield-value">${esc(order.product)}</span></div>
      <div class="ofield"><span class="ofield-label">ФИО</span><span class="ofield-value">${esc(order.fio)}</span></div>
      <div class="ofield"><span class="ofield-label">Телефон</span><span class="ofield-value">${esc(order.phone)}</span></div>
      <div class="ofield"><span class="ofield-label">Адрес ПВЗ</span><span class="ofield-value">${esc(order.pvzAddr)}</span></div>
      <div class="ofield"><span class="ofield-label">ПВЗ</span><span class="ofield-value">${esc(order.pvzName)}</span></div>
      ${order.comment?`<div class="ofield"><span class="ofield-label">Комм.</span><span class="ofield-value">${esc(order.comment)}</span></div>`:''}
    </div>
    <div class="chat-section">
      <div class="chat-header-row">Переписка</div>
      <div class="chat-msgs" id="chatMsgs">
        ${msgs||'<div style="text-align:center;font-style:italic;color:var(--silver3);padding:20px;font-size:13px">Сообщений пока нет</div>'}
      </div>
      <div class="chat-input-row">
        <textarea class="chat-txt" id="chatTxt" placeholder="Написать..." rows="2"></textarea>
        <button class="chat-btn" onclick="sendMsg('${id}')">ОТПРАВИТЬ</button>
      </div>
    </div>`;

  pushScreen('order-detail', 'Заявка #'+id.slice(-6).toUpperCase());
  setTimeout(()=>{const c=document.getElementById('chatMsgs');if(c)c.scrollTop=c.scrollHeight},60);
}

function sendMsg(orderId){
  const txt = document.getElementById('chatTxt').value.trim();
  if(!txt) return;
  const orders = gOrders();
  const order = orders.find(o=>o.id===orderId);
  if(!order) return;
  if(!order.msgs) order.msgs=[];
  order.msgs.push({role:'client',text:txt,time:now(),rc:true});
  sOrders(orders);
  document.getElementById('chatTxt').value='';
  // Re-render messages
  const msgs = order.msgs.map(m=>`
    <div class="chat-msg ${m.role==='client'?'own':''}">
      <div class="chat-meta">${m.role==='client'?'Вы':'SECRETLY'} · ${m.time}</div>
      <div class="bubble ${m.is_system?'bubble-system':m.role==='client'?'bubble-own':'bubble-other'}">${esc(m.text)}</div>
    </div>`).join('');
  const c = document.getElementById('chatMsgs');
  if(c){c.innerHTML=msgs;c.scrollTop=c.scrollHeight}
  toast('Отправлено');
}

// ═══ NEW ORDER ═══
function openNewOrder(){
  pushScreen('new-order','Новая заявка');
}

function submitOrder(){
  const product = document.getElementById('o-product').value.trim();
  const fio     = document.getElementById('o-fio').value.trim();
  const phone   = document.getElementById('o-phone').value.trim();
  const addr    = document.getElementById('o-addr').value.trim();
  const pvz     = document.getElementById('o-pvz').value.trim();
  const comment = document.getElementById('o-comment').value.trim();
  const pdp     = document.getElementById('o-pdp').checked;

  // Clear errors
  ['product','fio','phone','addr','pvz','pdp'].forEach(k=>{
    const el=document.getElementById('err-'+k);
    if(el) el.textContent='';
  });

  let ok=true;
  if(!product){document.getElementById('err-product').textContent='Укажите товар';ok=false}
  if(!fio){document.getElementById('err-fio').textContent='Укажите ФИО';ok=false}
  if(!phone){document.getElementById('err-phone').textContent='Укажите телефон';ok=false}
  if(!addr){document.getElementById('err-addr').textContent='Укажите адрес ПВЗ';ok=false}
  if(!pvz){document.getElementById('err-pvz').textContent='Укажите название ПВЗ';ok=false}
  if(!pdp){document.getElementById('err-pdp').textContent='Необходимо согласие на обработку данных';ok=false}
  if(!ok) return;

  const orders = gOrders();
  const order = {
    id:uid(), userId:tgUser.id, userName, product, fio, phone,
    pvzAddr:addr, pvzName:pvz, comment, status:'new', createdAt:now(), msgs:[]
  };
  orders.push(order);
  sOrders(orders);

  // Notify via TG if available
  if(tg) tg.HapticFeedback?.notificationOccurred('success');

  toast('Заявка отправлена!','ok');

  // Clear form
  ['o-product','o-fio','o-phone','o-addr','o-pvz','o-comment'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });
  document.getElementById('o-pdp').checked=false;

  // Go to orders
  setTimeout(()=>{navTo('orders')},600);
}

function openTelegram(){
  if(tg){
    tg.openLink('https://t.me/secretlyshop');
  } else {
    window.open('https://t.me/secretlyshop','_blank');
  }
}

function updateOrderBadge(count){
  if(count === undefined){
    const orders = gOrders();
    count = orders.filter(o=>o.msgs&&o.msgs.some(m=>m.role!=='client'&&!m.rc)).length;
  }
  const b = document.getElementById('ordersBadge');
  if(count>0){b.textContent=count;b.style.display='flex'}else{b.style.display='none'}
}

function toast(msg,type=''){
  const w = document.getElementById('toast');
  const el = document.createElement('div');
  el.className='toast-item'+(type?' '+type:'');
  el.textContent=msg;
  w.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}
